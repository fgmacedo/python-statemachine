# Native + trusted: exercises arbitrary Python `script` in the enter / before / on / after
# callback slots, structured `foreach`, a guard over computed data, and the native-only
# before/after lifecycle. Self-driving (raises its own event) so the harness reaches `pass`.
#
#   subtotal = 12 + 7 + 31 = 50  ->  discount = 50 // 10 = 5  ->  total = 45
#   trail records the callback order across the transition: before -> on -> after
name: order_pipeline
datamodel:
  - {id: prices, expr: "[]"}
  - {id: subtotal, expr: "0"}
  - {id: discount, expr: "0"}
  - {id: total, expr: "0"}
  - {id: trail, expr: "[]"}
states:
  cart:
    initial: true
    enter:
      - script: |
          prices = [12, 7, 31]
          trail = trail + ['cart']
      - raise: checkout
    transitions:
      - event: checkout
        target: pricing
        before:
          - script: "trail = trail + ['before']"
        on:
          - foreach:
              array: prices
              item: p
              do:
                - assign: {location: subtotal, expr: "subtotal + p"}
        after:
          - script: "trail = trail + ['after']"
  pricing:
    enter:
      - script: |
          discount = (subtotal // 10) if subtotal >= 50 else 0
          total = subtotal - discount
    transitions:
      - target: pass
        cond: "total == 45 and trail == ['cart', 'before', 'after']"
      - target: fail
  pass:
    final: true
  fail:
    final: true
